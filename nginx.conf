# Define an upstream group for load balancing to NestJS app containers
upstream nestjs_cluster {
    server app:3000; # Points to the Docker service 'app' on port 3000
}

server {
    listen 80; # Listen for HTTP traffic on port 80

    access_log /var/log/nginx/access.log combined;

    location / {
        proxy_pass http://nestjs_cluster; # Forward all requests to the upstream group
        proxy_http_version 1.1; # Use HTTP/1.1 for better proxy support
        proxy_set_header Connection ""; # Clear the Connection header (can help with keep-alive issues)
        proxy_set_header Host $host; # Pass the original Host header
        proxy_set_header X-Real-IP $remote_addr; # Forward the real client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Add forwarded-for header for proxies
        proxy_set_header X-Forwarded-Proto $scheme; # Forward the original protocol (http/https)
        add_header X-Upstream-Address $upstream_addr always; # Expose which app instance handled the request
        add_header X-Request-Id $request_id always; # Correlate NGINX and app-side debugging
    }
}
