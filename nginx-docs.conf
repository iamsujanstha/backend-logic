# --- GLOBAL SETTINGS ---
# The user that the nginx worker processes will run as (Security)
user nginx;

# 'auto' detects the number of CPU cores and creates 1 worker per core (Performance)
worker_processes auto;

# Location for the process ID file (Maintenance)
pid /var/run/nginx.pid;

# --- EVENTS BLOCK ---
# This defines how NGINX handles connections
events {
    # How many simultaneous connections can 1 worker handle
    worker_connections 1024;
    
    # 'multi_accept' tells NGINX to accept all new connections at once, not one by one
    multi_accept on;
}

# --- HTTP BLOCK ---
# This is where 90% of your logic lives
http {
    # --- BASIC SETTINGS ---
    # Tells NGINX how to map file extensions to internet media types (.js, .css, .html)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- PERFORMANCE OPTIMIZATIONS (The "Staff" Secrets) ---
    # 'sendfile' copies data directly from disk to the network card (Bypasses CPU)
    sendfile on;
    
    # 'tcp_nopush' sends data in full packets (Saves bandwidth)
    tcp_nopush on;
    
    # 'tcp_nodelay' ensures small data packets are sent instantly (Good for APIs)
    tcp_nodelay on;

    # How long to keep a connection open before closing it
    keepalive_timeout 65;

    # --- SECURITY HARDENING ---
    # Hides the NGINX version number (e.g., 1.25.1) from error pages (Prevents Fingerprinting)
    server_tokens off;

    # --- GZIP COMPRESSION ---
    # Compresses data before sending it (Saves money on data costs and speeds up mobile)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # 1 is fast/low, 9 is slow/high. 6 is the "Golden Middle"
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- UPSTREAM (The Load Balancer) ---
    # This points to your NestJS containers in Docker
    upstream nestjs_cluster {
        # 'least_conn' sends traffic to the least busy server
        least_conn;
        
        # 'app' is the service name from your docker-compose.yml
        server app:3000 max_fails=3 fail_timeout=30s;
        
        # This keeps 32 connections alive to prevent "Handshake" delays
        keepalive 32;
    }

    # --- SERVER BLOCK (The Gateway) ---
    server {
        listen 80;
        server_name localhost;

        # --- LOGGING ---
        # Separating logs makes it easier to find bugs
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;

        # --- ROUTE: API Logic ---
        location / {
            # Pass the request to the upstream cluster
            proxy_pass http://nestjs_cluster;

            # --- PROXY HEADERS (Essential for NestJS) ---
            # Tells NestJS the real IP of the user, not the Proxy's IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            
            # --- SECURITY HEADERS ---
            # Prevents your site from being put in an <iframe> (Anti-Clickjacking)
            add_header X-Frame-Options "SAMEORIGIN";
            # Stops the browser from "guessing" the file type
            add_header X-Content-Type-Options "nosniff";
            # Removes the "X-Powered-By: Express" header from NestJS
            proxy_hide_header X-Powered-By;

            # --- TIMEOUTS ---
            # If NestJS takes longer than 60s, NGINX will cut the connection (Safety)
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
        }

        # --- ROUTE: Static Files (Performance Offloading) ---
        # Any URL starting with /public/ is handled by NGINX directly
        location /public/ {
            alias /app/public/;
            expires 30d; # Tell the browser to cache these for a month
            add_header Cache-Control "public, no-transform";
        }
    }
}
